root: menu
fallback_node: invalid
nodes:
  menu:
    action: menu
    edges:
      - match: "1, hours"
        goto: hours
      - goto: invalid
  hours:
    action: hours
    edges:
      - match: "menu, back"
        goto: menu
      - goto: invalid
  invalid:
    action: invalid
    edges:
      - goto: menu
