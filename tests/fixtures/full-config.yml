chromium_path: "/usr/bin/chromium"
api_port: 3000
log_level: "info"
default_timeout: 300

actions:
  greet:
    steps:
      - message:
          body: "Hello! How can I help you today?"

  escalate:
    guards:
      cooldown:
        duration: 120
        on_blocked:
          - message:
              body: "You already requested a human agent. Please wait."
    steps:
      - message:
          body: "Connecting you to a human agent."
      - request:
          name: escalate-human
          url: "https://api.example.com/support/escalate"
          method: POST
          headers:
            Authorization: "Bearer token"
          timeout: 10000
          retry: 3

  lead-notify:
    steps:
      - request:
          name: lead-capture
          url: "https://crm.example.com/leads"
          method: POST
          headers:
            X-API-Key: "key"
          timeout: 5000
          retry: 2

  menu:
    steps:
      - message:
          body: "Main menu:\n1. Hours\n2. Pricing\n0. Exit"

  hours:
    steps:
      - message:
          body: "Mon-Fri 9am-6pm, Sat 10am-2pm"

  pricing:
    steps:
      - message:
          body: "Our pricing starts at $29/month."

  invalid:
    steps:
      - message:
          body: "That option is not valid."

  farewell:
    steps:
      - message:
          body: "Thanks! Bye."

  pong:
    steps:
      - message:
          body: "pong!"

  send-office:
    steps:
      - message:
          body: "Here is our office."
      - location:
          latitude: 19.4326
          longitude: -99.1332
          name: "Main Office"
          address: "Av. Reforma 123"

  send-store-only:
    steps:
      - location:
          latitude: 19.4326
          longitude: -99.1332
          name: "Store"

graphs:
  faq-support:
    root: menu
    timeout: 300
    fallback_node: invalid
    nodes:
      menu:
        action: menu
        edges:
          - match: "1, hours, schedule"
            goto: hours
          - match: "2, pricing, price"
            goto: pricing
          - match: "3, human, agent"
            goto: escalate-flow
          - goto: invalid
      hours:
        action: hours
        edges:
          - match: "menu, back"
            goto: menu
          - goto: invalid
      pricing:
        action: pricing
        edges:
          - match: "menu, back"
            goto: menu
          - goto: invalid
      escalate-flow:
        action: escalate
        edges: []
      invalid:
        action: invalid
        edges:
          - goto: menu
      farewell:
        action: farewell
        edges: []

  ping-pong:
    root: ping
    nodes:
      ping:
        action: pong
        edges: []

bots:
  support-bot:
    graph: faq-support
    settings:
      queue_delay: 1500
      simulate_typing: true
      typing_delay: 1000
      read_receipts: true
      ignore_groups: true
      ignored_senders:
        - "status@broadcast"
      admin_numbers:
        - "9999999999"

  sales-bot:
    graph: faq-support
    settings:
      queue_delay: 1000
      ignore_groups: false
      ignored_senders: []