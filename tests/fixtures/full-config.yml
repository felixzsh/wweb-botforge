chromium_path: "/usr/bin/chromium"
api_port: 3000
api_enabled: true
log_level: "info"
session_timeout: 300

actions:
  greet:
    reply: "Hello! How can I help you today?"

  escalate:
    reply: "Connecting you to a human agent."
    webhook:
      name: escalate-human
      url: "https://api.example.com/support/escalate"
      method: POST
      headers:
        Authorization: "Bearer token"
      timeout: 10000
      retry: 3
    cooldown: 120
    cooldown_reply: "You already requested a human agent. Please wait."

  lead-notify:
    webhook:
      name: lead-capture
      url: "https://crm.example.com/leads"
      method: POST
      headers:
        X-API-Key: "key"
      timeout: 5000
      retry: 2

  menu:
    reply: "Main menu:\n1. Hours\n2. Pricing\n0. Exit"

  hours:
    reply: "Mon-Fri 9am-6pm, Sat 10am-2pm"

  pricing:
    reply: "Our pricing starts at $29/month."

  invalid:
    reply: "That option is not valid."

  farewell:
    reply: "Thanks! Bye."

  pong:
    reply: "pong!"

  send-office:
    reply: "Here is our office."
    location:
      latitude: 19.4326
      longitude: -99.1332
      name: "Main Office"
      address: "Av. Reforma 123"

  send-store-only:
    location:
      latitude: 19.4326
      longitude: -99.1332
      name: "Store"

graphs:
  faq-support:
    root: menu
    timeout: 300
    fallback_node: invalid
    nodes:
      menu:
        action: menu
        edges:
          - match: "1, hours, schedule"
            goto: hours
          - match: "2, pricing, price"
            goto: pricing
          - match: "3, human, agent"
            goto: escalate-flow
          - goto: invalid
      hours:
        action: hours
        edges:
          - match: "menu, back"
            goto: menu
          - goto: invalid
      pricing:
        action: pricing
        edges:
          - match: "menu, back"
            goto: menu
          - goto: invalid
      escalate-flow:
        action: escalate
        edges: []
      invalid:
        action: invalid
        edges:
          - goto: menu
      farewell:
        action: farewell
        edges: []

  ping-pong:
    root: ping
    nodes:
      ping:
        action: pong
        edges: []

bots:
  support-bot:
    graph: faq-support
    settings:
      queue_delay: 1500
      simulate_typing: true
      typing_delay: 1000
      read_receipts: true
      ignore_groups: true
      ignored_senders:
        - "status@broadcast"
      admin_numbers:
        - "9999999999"

  sales-bot:
    graph: faq-support
    settings:
      queue_delay: 1000
      ignore_groups: false
      ignored_senders: []
