# WWeb BotForge Configuration Example
# This is a comprehensive example showing all available configuration options
# Copy this to ~/.config/wweb-botforge/config.yml and customize for your needs

# Global system configuration
global:
  chromiumPath: "/usr/bin/chromium"  # Path to your Chromium/Chrome installation
  apiPort: 3000                     # Port for REST API (optional)
  apiEnabled: true                  # Enable REST API for external integrations
  logLevel: "info"                  # Log level: info, debug, warn, error
  sessionTimeout: 300               # Global default timeout for flow sessions (seconds)

# Action Catalog — reusable actions that flows reference by id
# Actions are universal: not tied to any specific bot or flow
actions:
  # Simple reply action
  greet:
    reply: "Hello! Welcome to our support chat. How can I help you today?"

  # Menu action with options
  menu:
    reply: "Main menu:\n1. Hours & schedule\n2. Product catalog\n3. Talk to a human\n4. Pricing\n0. Exit"

  # Action with cooldown — same sender can't re-trigger within cooldown period
  escalate:
    reply: "Connecting you to a human agent. One moment please."
    webhook:
      name: escalate-human
      url: "https://api.example.com/support/escalate"
      method: POST
      headers:
        Authorization: "Bearer your-api-token"
      timeout: 10000
      retry: 3
    cooldown: 120                  # Seconds before same sender can trigger this again
    cooldown_reply: "You already requested a human agent. Please wait, one will connect shortly."

  # Webhook-only action
  lead-notify:
    webhook:
      name: lead-capture
      url: "https://crm.example.com/leads"
      method: POST
      headers:
        X-API-Key: "your-crm-key"
      timeout: 5000
      retry: 2

  hours:
    reply: "Our support hours:\n• Monday-Friday: 9:00 AM - 6:00 PM\n• Saturday: 10:00 AM - 2:00 PM\n• Sunday: Closed"

  catalog:
    reply: "Here's our product catalog: https://example.com/catalog.pdf"

  pricing:
    reply: "Our pricing starts at $29/month for the basic plan. Would you like more details?"

  invalid:
    reply: "That option is not valid. Please choose a number from the menu."

  farewell:
    reply: "Thank you! Have a great day. If you need anything else, just write 'menu'."

  pong:
    reply: "pong!"

# Flow Catalog — reusable conversation flows that bots reference by id
# Flows are universal: you can use the same flow in multiple bots
flows:
  # FAQ support flow with navigation menu
  faq-support:
    name: "FAQ Support"
    entry_step: menu
    triggers: "menu, hola, hello, hi, help, start"
    timeout: 300                   # Session TTL (seconds) — flow dies after inactivity
    fallback_step: invalid         # Where to go if user sends an unexpected response
    steps:
      menu:
        action: menu
        branches:
          - when: "1, hour, schedule, time, hours"
            goto: hours
          - when: "2, catalog, product, brochure"
            goto: catalog
          - when: "3, human, agent, person, talk, speak"
            goto: escalate
          - when: "4, price, pricing, cost"
            goto: pricing
          - when: "0, exit, bye, goodbye, end"
            goto: end
          - goto: invalid           # Default branch (no 'when'): catches everything else

      hours:
        action: hours
        branches:
          - when: "menu, back, return, volver"
            goto: menu
          - when: "0, exit"
            goto: end
          - goto: invalid

      catalog:
        action: catalog
        branches:
          - when: "menu, back"
            goto: menu
          - when: "0, exit"
            goto: end
          - goto: invalid

      escalate:
        action: escalate            # This action has cooldown
        branches:
          - when: "menu, back"
            goto: menu
          - when: "0, exit"
            goto: end
          - goto: invalid

      pricing:
        action: pricing
        branches:
          - when: "menu, back"
            goto: menu
          - when: "0, exit"
            goto: end
          - when: "interested, buy, order, quote"
            goto: lead
          - goto: invalid

      lead:
        action: lead-notify
        branches:
          - when: "menu, back"
            goto: menu
          - goto: end

      invalid:
        action: invalid
        branches:
          - goto: menu               # Always return to menu after invalid input

      end:
        action: farewell
        branches: []                 # Empty branches = terminal step, session ends here

  # Minimal single-step flow (replaces simple auto-responses)
  ping-pong:
    name: "Ping Pong"
    entry_step: ping
    triggers: "ping"
    steps:
      ping:
        action: pong
        branches: []

# Bot definitions
bots:
  # Support bot using the faq-support flow
  - id: support-bot-001
    name: "Customer Support"
    phone: "1234567890"  # Will be filled after WhatsApp authentication

    # Flows reference flow IDs from the flow catalog
    # Higher priority flows are checked first for entry triggers
    flows:
      - id: faq-support
        priority: 10
      - id: ping-pong
        priority: 5

    settings:
      queue_delay: 1500
      simulate_typing: true
      typing_delay: 1000
      read_receipts: true
      ignore_groups: true           # Ignore group messages
      ignored_senders:              # Senders to ignore entirely
        - "status@broadcast"        # WhatsApp status broadcasts

  # Sales bot reusing the same faq-support flow plus its own
  - id: sales-bot-002
    name: "Sales Assistant"
    phone: "1234567891"

    flows:
      - id: faq-support             # Same flow as support bot — reusable
        priority: 10

    settings:
      queue_delay: 1000
      ignore_groups: false          # Sales bot might engage in groups
      ignored_senders: []

# Actions can also be loaded from separate files in the actions/ directory:
#   ~/.config/wweb-botforge/actions/greet.yml
#
# Flows can also be loaded from separate files in the flows/ directory:
#   ~/.config/wweb-botforge/flows/faq-support.yml
#
# File name becomes the action/flow ID.
# Inline definitions in this file take precedence over directory files.

# Notes:
# - Bot IDs are auto-generated but you can customize them
# - Phone numbers are filled after WhatsApp QR code authentication
# - Triggers use comma-separated phrases with fuzzy matching (no regex needed)
# - fuzzy_threshold: 0.3=strict, 0.6=moderate (default), 0.9=loose
# - Action cooldowns prevent spam (per sender per action)
# - Flow sessions automatically expire after timeout seconds of inactivity
# - fallback_step handles unexpected user responses without breaking the flow
