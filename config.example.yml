# WWeb BotForge Configuration Example
# This is a comprehensive example showing all available configuration options
# Copy this to ~/.config/wweb-botforge/config.yml and customize for your needs

# Global system configuration
global:
  chromiumPath: "/usr/bin/chromium"  # Path to your Chromium/Chrome installation
  apiPort: 3000                     # Port for REST API (optional)
  apiEnabled: true                  # Enable REST API for external integrations
  logLevel: "info"                  # Log level: info, debug, warn, error

# Bot definitions
bots:
  # Example Support Bot
  - id: support-bot-001
    name: "Customer Support"
    phone: "1234567890"  # Will be filled after WhatsApp authentication

    # Auto-responses with fuzzy matching (comma-separated phrases)
    # Each phrase is matched independently — no regex needed
    auto_responses:
      - pattern: "hello, hi, hey, good morning, good afternoon"
        response: "Hello! 👋 Welcome to our support chat. How can I help you today?"
        fuzzy_threshold: 0.6
        priority: 1
        cooldown: 30  # 30 seconds cooldown per sender

      - pattern: "help, support, assist"
        response: "I'm here to help! You can ask me about:\n• Our products\n• Order status\n• Technical issues\n• Contact information"
        fuzzy_threshold: 0.6
        priority: 2
        cooldown: 60

      - pattern: "hours, time, open, schedule"
        response: "🕒 Our support hours:\n• Monday-Friday: 9:00 AM - 6:00 PM\n• Saturday: 10:00 AM - 2:00 PM\n• Sunday: Closed"
        fuzzy_threshold: 0.5
        priority: 1

      - pattern: "thank, thanks, gracias"
        response: "You're welcome! 😊 Is there anything else I can help you with?"
        fuzzy_threshold: 0.7
        priority: 1

      # Stricter match for specific terms
      - pattern: "brochure, catalog, pdf"
        response: "Here's our product catalog: https://example.com/catalog.pdf"
        fuzzy_threshold: 0.4
        priority: 2
        cooldown: 300  # 5 minutes cooldown

    # Webhooks for external integrations (comma-separated phrases, fuzzy matched)
    webhooks:
      - name: "support-ticket"
        pattern: "urgent, emergency, problem, issue, error"
        url: "https://api.example.com/support/tickets"
        method: "POST"
        headers:
          "Content-Type": "application/json"
          "Authorization": "Bearer your-api-token"
          "X-Source": "whatsapp-bot"
        timeout: 10000    # 10 seconds
        retry: 3         # Retry up to 3 times
        priority: 1
        cooldown: 300    # 5 minutes cooldown

      - name: "lead-capture"
        pattern: "interested, quote, price, cost, budget"
        url: "https://crm.example.com/leads"
        method: "POST"
        headers:
          "Content-Type": "application/json"
          "X-API-Key": "your-crm-key"
        timeout: 5000
        retry: 2
        priority: 2
        cooldown: 600  # 10 minutes

    # Bot behavior settings
    settings:
      queue_delay: 1500         # Delay before sending messages (ms)
      ignore_groups: true        # Ignore group messages
      ignored_senders:           # Senders to ignore
        - "status@broadcast"     # WhatsApp status broadcasts
        - "1234567890"          # Specific numbers

  # Example Sales Bot
  - id: sales-bot-002
    name: "Sales Assistant"
    phone: "1234567891"

    auto_responses:
      - pattern: "hi, hello, hey"
        response: "Hi there! 🚀 I'm your sales assistant. Ready to help you find the perfect solution?"
        fuzzy_threshold: 0.6
        priority: 1

      - pattern: "demo, trial, test, try"
        response: "Great! I'd love to show you a demo. 📅 When would be a good time for you?"
        fuzzy_threshold: 0.6
        priority: 2

      - pattern: "price, cost, pricing, fee"
        response: "Our pricing starts at $29/month for the basic plan. 💰 Would you like me to send you a detailed pricing guide?"
        fuzzy_threshold: 0.6
        priority: 2

    webhooks:
      - name: "sales-lead"
        pattern: "interested, buy, purchase, order, subscribe"
        url: "https://sales.example.com/leads"
        method: "POST"
        headers:
          "Content-Type": "application/json"
          "X-Source": "whatsapp-sales-bot"
        timeout: 8000
        retry: 3
        priority: 1

    settings:
      queue_delay: 1000
      ignore_groups: false  # Sales bot might want to engage in groups
      ignored_senders: []

  # Example Notification Bot (minimal config)
  - id: notifications-bot-003
    name: "Alert Bot"
    phone: "1234567892"

    # Catch-all response with high threshold
    auto_responses:
      - pattern: "."
        response: "📢 This is an automated notification service. For support, please contact our team."
        fuzzy_threshold: 0.9
        priority: 1
        cooldown: 60

    # No webhooks for this bot
    webhooks: []

    settings:
      queue_delay: 500
      ignore_groups: false
      ignored_senders: []

# Notes:
# - Bot IDs are auto-generated but you can customize them
# - Phone numbers are filled after WhatsApp QR code authentication
# - All patterns use comma-separated phrases with fuzzy matching (no regex needed)
# - fuzzy_threshold controls match strictness: 0.3=strict, 0.6=moderate (default), 0.9=loose
# - Cooldowns prevent spam (per sender-pattern combination)
# - Priorities determine which response matches first (higher = checked first)
# - Webhooks support GET/POST/PUT/PATCH methods
# - All webhook calls include sender info and message content
